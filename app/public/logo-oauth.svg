<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00F5D4"/>
      <stop offset="100%" stop-color="#A777FF"/>
    </linearGradient>
    <linearGradient id="check" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00F5D4"/>
      <stop offset="60%" stop-color="#00DDC0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="rgba(0,245,212,0.12)"/>
      <stop offset="100%" stop-color="rgba(0,245,212,0)"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#00F5D4" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#06080C"/>

  <!-- Subtle inner glow -->
  <circle cx="256" cy="240" r="200" fill="url(#glow)"/>

  <!-- Gradient border ring -->
  <circle cx="256" cy="256" r="236" fill="none" stroke="url(#ring)" stroke-width="12" opacity="0.9"/>

  <!-- Inner dark surface -->
  <circle cx="256" cy="256" r="216" fill="#0D1017"/>

  <!-- Checkmark with glow -->
  <path d="M152 264 L224 336 L360 184"
    fill="none" stroke="url(#check)" stroke-width="40"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#shadow)"/>
</svg>
